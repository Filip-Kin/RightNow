name: android-apk
# Manual-only: build a sideloadable Android APK on demand (kept off the push path so
# it never slows the web deploy). Run from the Forgejo Actions tab -> Run workflow.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: nas
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK (release-signed, arm64-v8a)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -eu
          IMG="rightnow-android:${{ github.sha }}"
          DOCKER_BUILDKIT=1 docker build -f Dockerfile.android -t "$IMG" \
            --build-arg VERSION_CODE=${{ github.run_number }} \
            --secret id=ks_b64,env=ANDROID_KEYSTORE_BASE64 \
            --secret id=ks_pass,env=ANDROID_KEYSTORE_PASSWORD \
            --secret id=key_alias,env=ANDROID_KEY_ALIAS \
            --secret id=key_pass,env=ANDROID_KEY_PASSWORD \
            .
          mkdir -p out
          cid=$(docker create "$IMG")
          docker cp "$cid":/RightNow.apk out/RightNow.apk
          docker cp "$cid":/RightNow.aab out/RightNow.aab
          docker cp "$cid":/RightNow-wear.apk out/RightNow-wear.apk
          docker cp "$cid":/RightNow-wear.aab out/RightNow-wear.aab
          docker rm "$cid"
          docker image rm "$IMG" || true
          ls -la out

      # Forgejo doesn't support actions/upload-artifact@v4, so publish the APK to a
      # moving "android-latest" release for a stable phone-download URL. git.filipkin.com
      # is pinned to the LAN nginx (host /etc/hosts pin isn't inherited by the job).
      - name: Publish APK to android-latest release
        run: |
          set -eu
          echo "192.168.1.2 git.filipkin.com" >> /etc/hosts
          command -v curl >/dev/null 2>&1 || (apt-get update && apt-get install -y --no-install-recommends curl)
          export PUBLISH_TOKEN="${{ secrets.PUBLISH_TOKEN }}"
          sh ci/publish-apk.sh
