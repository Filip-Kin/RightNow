// Standalone Wear OS companion (NOT part of the Expo android/ project, which is
// gitignored + regenerated by prebuild). Pinned to a self-consistent toolchain that
// the Dockerfile.android SDK already supports (android-35, build-tools 35.0.0, JDK 17).
plugins {
  id 'com.android.application' version '8.7.3' apply false
  id 'org.jetbrains.kotlin.android' version '2.0.21' apply false
  id 'org.jetbrains.kotlin.plugin.compose' version '2.0.21' apply false
}
